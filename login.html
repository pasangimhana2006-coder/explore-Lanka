<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Explore Lanka</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="login-page">

        <img src="Images/login.jpg.png"
             alt="Background"
             class="login-bg">

        <div class="overlay"></div>

        <div class="login-box">

            <h1>Welcome Back</h1>

            <p>
                Login to continue your journey with Explore Lanka
            </p>

            <input
                type="email"
                id="email"
                placeholder="Email Address">

            <input
                type="password"
                id="password"
                placeholder="Password">

            <button
                onclick="validateLogin()">

                Login

            </button>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>

</body>
</html>
