<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customize Your Trip | Explore Lanka</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="custom-trip-page">

        <div class="custom-overlay"></div>

        <img src="Images/customizing trip.png"
             alt="Sri Lanka"
             class="custom-bg">

        <div class="custom-header">

            <h1>Customize Your Dream Trip</h1>

            <p>
                Tell us about your travel preferences and we'll help
                create a personalized Sri Lankan adventure.
            </p>

        </div>

    </section>

    <section class="trip-form-section">

        <div class="trip-form-container">

            <h2>Trip Details</h2>

            <form>

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text"
                           placeholder="Enter your name">

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email"
                           placeholder="Enter your email">

                </div>

                <div class="form-group">

                    <label>Country</label>

                    <input type="text"
                           placeholder="Your country">

                </div>

                <div class="form-group">

                    <label>Contact Number</label>

                    <input type="tel"
                           placeholder="+94">

                </div>

                <div class="form-group">

                    <label>Arrival Date</label>

                    <input type="date">

                </div>

                <div class="form-group">

                    <label>Departure Date</label>

                    <input type="date">

                </div>

                <div class="form-group">

                    <label>Number of Travelers</label>

                    <select>

                        <option>1 Person</option>
                        <option>2 Persons</option>
                        <option>3-5 Persons</option>
                        <option>6-10 Persons</option>
                        <option>10+ Persons</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Travel Style</label>

                    <select>

                        <option>Adventure</option>
                        <option>Beach Holiday</option>
                        <option>Luxury</option>
                        <option>Nature</option>
                        <option>Cultural Tour</option>
                        <option>Wildlife Safari</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Preferred Destinations</label>

                    <input type="text"
                           placeholder="Ella, Sigiriya, Mirissa...">

                </div>

                <div class="form-group">

                    <label>Special Requirements</label>

                    <textarea rows="5"
                              placeholder="Tell us more about your trip..."></textarea>

                </div>

                <button type="submit"
                        class="submit-trip-btn">

                    Submit Request

                </button>

            </form>

        </div>

    </section>

</body>

</html>
